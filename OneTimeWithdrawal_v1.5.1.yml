      responses:
        '201':
          description: Created — full surrender request accepted for processing.
          headers:
            Location:
              description: >
                URL of the created arrangement resource.
                Format: /v1/policies/{policyNumber}/withdrawal-requests/{requestId}
              schema:
                type: string
                format: uri
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

  /v1/policies/{policyNumber}/withdrawal-requests/{requestId}:
    get:
      operationId: getWithdrawalRequest
      tags:
        - Withdrawal Request Lifecycle
      description: >
        Retrieve the current processing status of a previously submitted
        withdrawal request. This endpoint allows clients to poll for
        status updates until the transaction reaches a final outcome.
      parameters:
        - $ref: '#/components/parameters/PolicyNumber'
        - name: requestId
          in: path
          required: true
          description: >
            Identifier returned in the Location header from the Withdrawal request POST.
          schema:
            type: string
      responses:
        '200':
          description: Withdrawal request resource.
          headers:
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetWithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }

components:
  parameters:
    PolicyNumber:
      name: policyNumber
      in: path
      required: true
      description: Unique policy number(1 to 30 characters).
      schema:
        type: string
        minLength: 1
        maxLength: 30
    CorrelationIdHeader:
      name: correlationId
      in: header
      required: true
      description: Optional client-supplied identifier to trace the request.
      schema:
        type: string
        maxLength: 100
    TransactionSubType:
      name: transactionSubType
      in: query
      required: true
      description: >
            Indicates the business context and validation rules for the withdrawal request.
            This field drives conditional payload requirements and processing logic.

            Special Behavior:
            - The value of `transactionSubType` determines whether additional fields
              (such as `rmdInfo`) are required or must be omitted.

            Values:
            - specified-withdrawal: Standard partial withdrawal
            - surrender-free: Withdrawal within free limits
            - rider-free: Withdrawal covered under rider benefits
            - interest-only: Withdrawal limited to earned interest
            - rmd: Required Minimum Distribution (RMD)

            Rules:
            - When transactionSubType = rmd:
              - `rmdInfo` MUST be provided in the request body
            - When transactionSubType ≠ rmd:
              - `rmdInfo` MUST NOT be present
      schema:
        type: string
        enum: [specified-withdrawal, surrender-free, rider-free, interest-only, rmd]
    AssociatedFirmId:
      name: associatedFirmId
      in: query
      required: true
      description: Optional firm/linkage identifier (preferred location per IRI).
      schema:
        type: string
        minLength: 1
        maxLength: 65

  headers:
    correlationId:
      description: Correlates this response to requests and downstream logs.
      required: true
      schema:
        type: string
        maxLength: 100

  responses:
    BadRequestError:
      description: Bad Request
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: Unauthorized
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: Forbidden
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFoundError:
      description: Not Found
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowedError:
      description: Method Not Allowed
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotAcceptableError:
      description: Not Acceptable
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ConflictError:
      description: Conflict
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    PayloadTooLargeError:
      description: Payload Too Large
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaTypeError:
      description: Unsupported Media Type
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntityError:
      description: Unprocessable Entity
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequestsError:
      description: Too Many Requests
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal Server Error
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGatewayError:
      description: Bad Gateway
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailableError:
      description: Service Unavailable
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GatewayTimeoutError:
      description: Gateway Timeout
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    TransactionAmounts:
      type: object
      description: >
        Defines the withdrawal amount details using either a fixed amount,
        percentage, or system-determined calculation based on `amountType`.

        Special Behavior (Conditional Validation):
        - This schema uses JSON Schema conditional logic (`if/then/not`) to enforce
          field requirements and mutual exclusivity based on `amountType`.
        - Consumers MUST structure the payload according to the selected `amountType`.

        Rules by amountType:
        - AMOUNT:
          - `requestedAmount` is REQUIRED
          - `requestedPercentage` MUST NOT be provided
        - PERCENTAGE:
          - `requestedPercentage` is REQUIRED
          - `requestedAmount` MUST NOT be provided
        - MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS,
          EARNINGSONLY, PENALTYFREE, RIDERFREE:
          - Neither `requestedAmount` nor `requestedPercentage` should be provided
          - Withdrawal amount will be calculated by the system per product rules
      properties:
        requestedAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          minimum: 0
          maximum: 100
        amountType:
          type: string
          enum: [AMOUNT, PERCENTAGE, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY, PENALTYFREE, RIDERFREE]
        disbursementType:
          type: string
          enum: [GROSS, NET]
        disbursementPaymentForm:
          type: string
          enum: [DTCC, EFT, ACH, CHECK, WIRE]
      required:
        - amountType
        - disbursementType
      allOf:
          - if:
              properties:
                amountType:
                  const: AMOUNT
              required:
                - amountType
            then:
              required:
                - requestedAmount
              not:
                required:
                  - requestedPercentage
          - if:
              properties:
                amountType:
                  const: PERCENTAGE
              required:
                - amountType
            then:
              required:
                - requestedPercentage
              not:
                required:
                  - requestedAmount
          - if:
              properties:
                amountType:
                  enum: [MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY, PENALTYFREE, RIDERFREE]
              required:
                - amountType
            then:
              required: [amountType]
              not:
                anyOf:
                  - required: [requestedAmount]
                  - required: [requestedPercentage]

    TransactionAmountsFull:
      type: object
      description: Details of financial amounts associated with the transaction
      properties:
        disbursementType:
          type: string
          enum: [GROSS, NET]
        disbursementPaymentForm:
          type: string
          enum: [DTCC, EFT, ACH, CHECK, WIRE]
      required:
        - disbursementType

    PayeeOrBeneficiary:
      type: object
      description: |
        The payeeOrBeneficiary object represents how the withdrawal proceeds are distributed and to whom. It includes payment form, allocation rules for each payee.
      properties:
        paymentForm:
          type: string
          enum: [DTCC, ACH, CHECK, WIRE, EXCHANGE]
        allocationPercentage:
          type: number
          minimum: 0
          maximum: 100
        party:
          anyOf:
            - $ref: '#/components/schemas/IndividualIdentity'
            - $ref: '#/components/schemas/EntityIdentity'
        bank:
          $ref: '#/components/schemas/Bank'
        address:
          $ref: '#/components/schemas/Address'

    TaxWithholdingInstruction:
      type: object
      description: >
        Defines tax withholding instructions for a party in the withdrawal request.
        Valid Options:
        - Provide `dollar`:
          - Represents a fixed withholding amount
          - `percentage` must not be provided

        - Provide `percentage`:
          - Represents withholding as a percentage
          - `dollar` must not be provided

        - Provide neither:
          - Indicates no explicit withholding amount is supplied
          - Typically aligns with taxRateToUse values such as
            NOWITHHOLDINGELECTED, USEDEFAULTTABLE, NOWITHHOLDINGALLOWED

        Invalid Scenarios:
        - Providing both `dollar` and `percentage`
        - Providing partial or conflicting withholding inputs

        Notes:
        - Exactly one of the above conditions must be satisfied
        - Validation will fail if none or multiple conditions match

      properties:
        party:
          anyOf:
            - $ref: '#/components/schemas/IndividualIdentity'
            - $ref: '#/components/schemas/EntityIdentity'
        taxWithholdingType:
          type: string
          enum: [FEDERAL, STATE, NRA, BACKUP]
        taxRateToUse:
          type: string
          enum: [NOWITHHOLDINGELECTED, USEVALUESENTERED, NOWITHHOLDINGALLOWED, USEDEFAULTTABLE]
        filingStatus:
          type: string
          enum: [SINGLE, DOMESTICPARTNERSHIP, DEFAULT, MARRIED, HEADOFHOUSEHOLD, WIDOWED, DIVORCED]
        dollar:
          type: number
          description: Computed tax amount
          minimum: 0
          maximum: 9999999999.99
        percentage:
          type: number
          description: Computed tax percentage
          minimum: 0
          maximum: 100
        taxJurisdiction:
          type: string
          maxLength: 50
      required:
        - taxWithholdingType
        - taxRateToUse
      oneOf:
        - description: Use a fixed dollar amount for withholding.
          required: [dollar]
        - description: Use a percentage for withholding.
          required: [percentage]
        - description: >
            No withholding amount required (e.g. taxRateToUse of
            NOWITHHOLDINGELECTED ,USEDEFAULTTABLE, NOWITHHOLDINGALLOWED). Neither dollar
            nor percentage is supplied.
          not:
            anyOf:
              - required: [dollar]
              - required: [percentage]
      allOf:
        - if:
            properties:
              taxWithholdingType:
                const: STATE
          then:
            required:
              - taxJurisdiction
    
    Party:
      type: object
      description: |
        The parties object represents the policy parties relevant to the withdrawal (owners, annuitants, beneficiaries, etc.), along with their identity, relationship, and payout instructions.
      allOf:
        - anyOf:
            - $ref: '#/components/schemas/IndividualParty'
            - $ref: '#/components/schemas/EntityParty'
        - type: object
          required:
            - paymentForm
            - allocationPercentage
          properties:
            paymentForm:
              type: string
              enum: [DTCC, ACH, CHECK, WIRE, EXCHANGE]
            allocationPercentage:
              type: number
              minimum: 0
              maximum: 100
            bank:
              $ref: '#/components/schemas/Bank'
            address:
              $ref: '#/components/schemas/Address'

    Producer:
      type: object
      description: Information about the producer submitting the request
      required:
        - npn
      properties:
        producerNumber:
          type: string
          maxLength: 100
        npn:
          type: string
          maxLength: 100
        crdNumber:
          type: string
          maxLength: 100

    FundDistribution:
      type: object
      description: >
        Represents fund-level details associated with the withdrawal request.
        Conditional Rules:
        - Either `requestedAmount` OR `requestedPercentage` must be provided.
        - Both fields MUST NOT be provided together.
        - At least one of the two fields is required
      properties:
        fundId:
          type: string
          maxLength: 100
        fundName:
          type: string
          maxLength: 100
        totalFundValue:
          type: [number, "null"]
          minimum: 0
          maximum: 9999999999.99
        requestedAmount:
          type: [number, "null"]
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          minimum: 0
          maximum: 100
      oneOf:
        - required: [requestedAmount]
          not:
            required: [requestedPercentage]

        - required: [requestedPercentage]
          not:
            required: [requestedAmount]

    Charges:
      type: object
      description: Details of fees and deductions applied to the transaction
      properties:
        chargeType:
          type: string
          enum: [COSTOFINSURANCE, EXPENSECHARGE, UNITEXPENSECHARGE, RIDERCHARGE, SURRENDERCHARGE, WITHDRAWALCHARGE]
        isChargeWaived:
          type: boolean
        chargeWaiverReason:
          type: string
          maxLength: 100

    Address:
      type: object
      properties:
        addressId:
          type: string
          maxLength: 100
        addressType:
          type: string
          enum: [RESIDENCE, BUSINESS, POBOXSEASONAL, APO, DPO, FPO]
          maxLength: 30
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        addressLine3:
          type: string
          maxLength: 100
        addressLine4:
          type: string
          maxLength: 100
        addressLine5:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          maxLength: 2
          pattern: "^[A-Z]{2}$"
        zipCode:
          type: string
          maxLength: 10
          pattern: "^[0-9A-Za-z -]{3,10}$"
        zipCodeExtension:
          type: string
          maxLength: 4
          pattern: "^[0-9A-Za-z]{1,4}$"
        country:
          type: string
          maxLength: 2
          pattern: "^[A-Z]{2}$"
      required:
        - addressType
        - addressLine1
        - city
        - state
        - zipCode

    Bank:
      type: object
      properties:
        bankId:
          type: string
          maxLength: 100
        nameOnAccount:
          type: string
          maxLength: 100
        accountStatus:
          type: string
          enum: [ACTIVEBANKACCOUNT, TERMINATEDBANKACCOUNT]
        accountType:
          type: string
          enum:
            [CHECKING, SAVINGS, CREDITCARDACCOUNT, DEBITCARDACCOUNT, BROKERAGEACCOUNT, CERTIFICATEOFDEPOSITACCOUNT]
        accountNumber:
          type: string
          maxLength: 17
          pattern: '^\d{4,17}$'
        routingNumber:
          type: string
          maxLength: 9
          pattern: '^\d{9}$'
        branchName:
          type: string
          maxLength: 100
      required:
        - nameOnAccount
        - accountType
        - accountNumber
        - routingNumber

    IndividualParty:
      description: Schema for individual party data
      type: object
      allOf:
        - $ref: '#/components/schemas/IndividualIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    EntityParty:
      description: Schema for entity party data
      type: object
      allOf:
        - $ref: '#/components/schemas/EntityIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    IndividualIdentity:
      description: Schema for individual identity data
      required: [firstName, lastName, taxId]
      type: object
      properties:
        type:
          type: string
          const: individual
        firstName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        middleName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        lastName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        taxId:
          type: string
          maxLength: 9

    PartyRelationship:
      description: Schema for party relationship data
      type: object
      required: [relationships]
      properties:
        relationships:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            enum:
              - owner
              - jointOwner
              - annuitant
              - jointAnnuitant
              - primaryBeneficiary
              - contingentBeneficiary

    EntityIdentity:
      description: Schema for entity identity data
      type: object
      required: [type, name, taxId]
      properties:
        type:
          type: string
          const: entity
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[\w=()*@#\s.,''\/~%$!;:&"®`\\?\-]{1,100}$'
        taxId:
          type: string
          maxLength: 9

    RmdInfo:
      type: object
      description: >
        Provides Required Minimum Distribution (RMD) details for the withdrawal.

        Special Behavior:
        - This object is conditionally required based on `transactionSubType`.

        Rules:
        - MUST be provided when `transactionSubType = rmd`
        - MUST NOT be provided for any non-RMD transaction

        Notes:
        - This object enables regulatory compliance for IRS RMD rules.
        - Incorrect usage (missing or extraneous inclusion) will cause request validation failure.
      properties:
        rmdTaxYear:
          type: integer
          minimum: 1900
          maximum: 2100
        rmdAgeAtDistribution:
          type: integer
          minimum: 0
          maximum: 150
        rmdSpouseDoB:
          type: string
          format: date
        rmdRequestedAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
          multipleOf: 0.01
        rmdCalculationMethod:
          type: string
          enum: [UNIFORM_LIFETIME_TABLE, JOINT_LIFE, SINGLE_LIFE, OTHER]
        rmdPriorYearEndValue:
          type: number
          minimum: 0
          maximum: 9999999999.99
          multipleOf: 0.01
      required:
        - rmdTaxYear
        - rmdRequestedAmount
        - rmdCalculationMethod

    OneTimePartialWithdrawalRequest:
      type: object
      description: >
        Represents a one-time partial withdrawal request, including standard withdrawals
          and Required Minimum Distributions (RMD).

          Special Behavior:
          - This schema is governed by external business rules defined via `transactionSubType`.
          - Conditional validation is applied based on the subtype of the transaction.

          Rules:
          - When `transactionSubType = rmd`:
            - `rmdInfo` is REQUIRED
            - `transactionAmounts.requestedAmount` typically aligns with RMD calculation
          - When `transactionSubType ≠ rmd`:
            - `rmdInfo` MUST NOT be provided
      properties:
        effectiveDate:
          type: string
          format: date
        nsccParticipantId:
          type: string
          maxLength: 100
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
          description: unique identification code. Optional; REQUIRED only when policyNumber is not globally unique.
        producer:
          $ref: '#/components/schemas/Producer'
        transactionAmounts:
          $ref: '#/components/schemas/TransactionAmounts'
        allocationOption:
          type: string
          enum: [PRORATA, DOLLAR, SPECIFYPERCENTAGE, SPECIFIEDFUNDS, SPECIFIEDSEGMENTS, DEFAULT, PECKINGORDER, EARNINGSONLY]
          description: Defines the format of how the funds are removed
        fundDistributions:
          type: array
          items:
            $ref: '#/components/schemas/FundDistribution'
        rmdInfo:
          $ref: '#/components/schemas/RmdInfo'
        payeeOrBeneficiary:
          type: array        
          items:
            $ref: '#/components/schemas/PayeeOrBeneficiary'
        parties:
          type: array
          items:
            $ref: '#/components/schemas/Party'
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'
        charges:
          type: array
          items:
            $ref: '#/components/schemas/Charges'
        isOverride:
          type: boolean
      required:
        - effectiveDate
        - cusip
        - allocationOption
        - nsccParticipantId
        - producer
      allOf:
        - if:
            properties:
              allocationOption:
                const: SPECIFIEDFUNDS
              transactionAmounts:
                type: object
                properties:
                  amountType:
                    const: PERCENTAGE
                required: [amountType]
            required: [allocationOption, transactionAmounts]
          then:
            required:
              - fundDistributions
            properties:
              fundDistributions:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/FundDistribution'
                    - type: object
                      required: [requestedPercentage]
                    - not:
                          required: [requestedAmount]
        - if:
            properties:
              allocationOption:
                const: SPECIFIEDFUNDS
              transactionAmounts:
                type: object
                properties:
                  amountType:
                    const: AMOUNT
                required: [amountType]
            required: [allocationOption, transactionAmounts]
          then:
            required:
              - fundDistributions
            properties:
              fundDistributions:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/FundDistribution'
                    - type: object
                      required: [requestedAmount]
                    - not:
                          required: [requestedPercentage]


    FullSurrenderRequest:
      type: object
      description: Request to perform a full surrender.
      properties:
        effectiveDate:
          type: string
          format: date
        nsccParticipantId:
          type: string
          maxLength: 100
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
          description: unique identification code. Optional; Required only when policyNumber is not globally unique.
        producer:
          $ref: '#/components/schemas/Producer'
        transactionAmounts:
          $ref: '#/components/schemas/TransactionAmountsFull'
        payeeOrBeneficiary:
          type: array
          items:
            $ref: '#/components/schemas/PayeeOrBeneficiary'
        parties:
          type: array
          items:
            $ref: '#/components/schemas/Party'
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'
        charges:
          type: array
          items:
            $ref: '#/components/schemas/Charges'
        isOverride:
          type: boolean
      required:
        - effectiveDate
        - nsccParticipantId
        - cusip
        - producer

    WithdrawalRequestStatus:
      type: object
      description: Withdrawal request status resource created by the POST.
      properties:
        requestId:
          type: string
          description: Server-assigned identifier for the withdrawal request.
        status:
          type: string
          description: Current status of the withdrawal request.
          enum: [CREATED, REJECTED]
        effectiveDate:
          type: string
          format: date
        transactionSubType:
          type: string
          enum: [specified-withdrawal, surrender-free, rider-free, interest-only, rmd]
        message:
          type: string
          description: >
            Optional informational or error message explaining the
            processing result.
      required: [requestId, status]
        
    GetWithdrawalRequestStatus:
      type: object
      description: Withdrawal request status resource created by the GET.
      properties:
        requestId:
          type: string
          description: Server-assigned identifier for the withdrawal request.
        status:
          type: string
          description: Current status of the withdrawal request.
          enum: [IN_PROGRESS, SUCCESS, REJECTED]
        effectiveDate:
          type: string
          format: date
        transactionSubType:
          type: string
          enum: [specified-withdrawal, surrender-free, rider-free, interest-only, rmd]
        message:
          type: string
          description: >
            Optional informational or error message explaining the
            processing result.
      required: [requestId, status]

    Error:
      type: object
      properties:
        httpStatus:
          type: integer
          description: HTTP status code associated with this error
          minimum: 400
          maximum: 599
        code:
          type: string
          description: >
            A structured error code that uniquely identifies the type of error. This can follow a hierarchical format:
            - `<domain>`: The logical domain (e.g., "gateway")
            - `<category>`: The error category (e.g., "client" or "server")
            - `<subcategory>`: A specific error identifier (e.g., "badrequest", "timeout")
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred
        message:
          type: string
          description: Message with specific error details.
        validationErrors:
          type: array
          description: Logical rule violations or decision failures related to business logic or rules
          items:
            type: object
            properties:
              code:
                type: string
                description: Code to classify the error & Identifies the type of business rule or decision failure.
              message:
                type: string
                description: Why the error occurred / Specific business rule violation
      required:
        - code
        - message

    Day2WithdrawalConfirmationEvent:
      x-event-mesh:
        broker: SAP Advanced Event Mesh / Solace
        topicPattern: "{root}/ift/v1/{eventType}/{status}/{transactionType}/{firm}"
        deliveryModel: topic-subscription
        asyncApiSpec: "./asyncapi/OneTimeWithdrawal_Day2_v1.5.yaml"
        note: >
          Delivered over a message broker via topic subscription, not an HTTP
          callback. A companion AsyncAPI document is the machine-readable
          contract; this extension exists for interim discoverability.
      type: object
      description: >
        Canonical Day-2 withdrawal confirmation event published to the
        enterprise event mesh after a one-time withdrawal request
        completes processing.

      required:
        - eventType
        - eventId
        - eventTimestamp
        - associatedFirmId
        - requestId
        - policyNumber
        - transactionType
        - status
        - transExeDate
        - transExeTime
        - nsccParticipantId
        - npn
        - correlationId
      properties:
        # Event-level metadata
        eventType:
          type: string
          description: >
            Identifies the type of Day-2 confirmation event published to
            the event mesh. 
          enum:
            - day2confirm
        eventId:
          type: string
          maxLength: 36
          format: uuid
          description: >
            Globally unique identifier for this event. Used by consuming
            systems for idempotent processing and duplicate detection.
        eventTimestamp:
          type: string
          format: date-time
          description: >
            Date and time when the event was published to the event mesh.
        associatedFirmId:
          type: string
          maxLength: 65
          description: >
            Firm identifier associated with the transaction. Populated by
            the integration platform as part of event enrichment.

        # Day-2 business outcome data

        requestId:
          type: string
          description: >
            Identifier assigned when the withdrawal request was submitted.
            Used to correlate the Day-2 confirmation with the original
            Day-1 request.
        correlationId:
          type: string
          maxLength: 100
          description: >
            Optional correlation identifier supplied with the original
            request and propagated to the Day-2 confirmation for
            end-to-end traceability.
        policyNumber:
          type: string
          minLength: 1
          maxLength: 30
          description: >
            Policy number associated with the withdrawal request.
        transactionType:
          type: string
          enum:
            - one-time-partials
            - full-surrenders
          description: >
            High-level classification of the transaction that completed
            processing.
        transactionSubType:
          type: string
          description: >
            Optional subtype of the transaction, when applicable
            (for example, RMD or interest-only).
          enum:
            - specified-withdrawal
            - surrender-free
            - rider-free
            - interest-only
            - rmd
        status:
          type: string
          description: >
            Final processing outcome of the withdrawal request.
          enum:
            - SUCCESS
            - SUCCESS_WITH_INFO
            - FAILURE
        message:
          type: string
          description: >
            Human-readable explanation of the outcome. Populated when the transaction fails or additional explanation is required.
        effectiveDate:
          type: string
          format: date
          description: >
            Effective date of the withdrawal on the policy, when applicable.
        npn:
          type: string
          maxLength: 100
          description: >
            National Producer Number associated with the transaction,
            when available.
        nsccParticipantId:
          type: string
          maxLength: 100
          description: >
            NSCC participant identifier associated with the submitting firm, when available.
        transExeDate:
          type: string
          format: date
          description: >
            Date on which the Day‑2 confirmation was produced by the
            transaction processing system.
        transExeTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$'
          description: >
            Time on which the Day-2 confirmation was produced by the
            transaction processing system.
    