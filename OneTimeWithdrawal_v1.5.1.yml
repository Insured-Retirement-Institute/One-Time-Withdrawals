openapi: 3.1.0
info:
  title: One-Time Withdrawal API (Full Surrender and Partial Withdrawal(including RMD))
  version: 1.5.1
  description: >
    API to submit one-time withdrawals (Partial, Full, and RMD) on a policy.
    Supported transaction types: oneTimePartialWithdrawal, fullSurrender.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
    
paths:
  /v1/policies/{policyNumber}/withdrawal-requests/one-time-partials:
    post:
      operationId: submitOneTimeWithdrawal
      tags:
        - One Time Partial Withdrawal Request
      description: >
        Submit a one-time partial withdrawal. Select rmd as a transactionSubType for One Time RMD request.
      parameters:
        - $ref: '#/components/parameters/PolicyNumber'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/TransactionSubType'
        - $ref: '#/components/parameters/AssociatedFirmId'    
      x-business-rule:
        rmd:
          when:
            transactionSubType: rmd
          require:
            - $.rmdInfo
        nonRmd:
          when:
            transactionSubType:
              not:
                in: [rmd]
          constraints:
            - name: "forbid-rmdInfo-when-not-rmd"
              description: When transactionSubType is not RMD, rmdInfo must be omitted to avoid ambiguous payloads.
              assert: "$.rmdInfo == null"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneTimePartialWithdrawalRequest'
            examples:
              OneTimePartialWithdrawal_RMD_Example:
                summary: Partial Withdrawal RMD subtype
                value:
                  effectiveDate: '2025-03-01'
                  nsccParticipantId: 'NSCC888'
                  cusip: '0275IFOW4'
                  producer:
                    producerNumber: 'PROD888'
                    npn: '1111111111'
                    crdNumber: '2222222222'
                  transactionAmounts:
                    requestedAmount: 750.00
                    amountType: 'AMOUNT'
                    disbursementType: 'NET'
                    disbursementPaymentForm: 'ACH'
                  allocationOption: 'PRORATA'
                  fundDistributions:
                    - fundId: 'FUND-RMD1'
                      fundName: 'Balanced Fund'
                      totalFundValue: null
                      requestedAmount: null
                    - fundId: 'FUND-RMD2'
                      fundName: 'Equity Fund'
                      totalFundValue: null
                      requestedAmount: null
                  rmdInfo:
                    rmdTaxYear: 2025
                    rmdAgeAtDistribution: 72
                    rmdSpouseDoB: '1953-05-10'
                    rmdRequestedAmount: 750.00
                    rmdCalculationMethod: 'UNIFORM_LIFETIME_TABLE'
                    rmdPriorYearEndValue: 80000.00
                  payeeOrBeneficiary:
                    - paymentForm: 'ACH'
                      allocationPercentage: 100.00
                      party:
                        taxId: '123456789'
                        firstName: 'Morgan'
                        middleName: 'B'
                        lastName: 'Lee'
                        type: individual
                        bank:
                          bankId: 'Bank_RMD'
                          nameOnAccount: 'Morgan Lee'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '123123123'
                          routingNumber: '321321321'
                          branchName: 'Downtown Branch'
                        address:
                          addressId: 'Addr_RMD'
                          addressType: 'RESIDENCE'
                          addressLine1: '300 Elm St'
                          addressLine2: 'Unit 5'
                          addressLine3: 'Bldg A'
                          city: 'Chicago'
                          state: 'IL'
                          zipCode: '60601'
                          zipCodeExtension: '1234'
                          country: 'US'
                  parties:
                    - taxId: '123456789'
                      firstName: 'Morgan'
                      middleName: 'B'
                      lastName: 'Lee'
                      type: individual
                      relationships:
                        - owner
                      paymentForm: 'ACH'
                      allocationPercentage: 100
                      bank:
                        bankId: 'Bank_RMD'
                        nameOnAccount: 'Morgan Lee'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '123123123'
                        routingNumber: '321321321'
                        branchName: 'Downtown Branch'
                      address:
                        addressId: 'Addr_RMD'
                        addressType: 'RESIDENCE'
                        addressLine1: '300 Elm St'
                        addressLine2: 'Unit 5'
                        addressLine3: 'Bldg A'
                        addressLine4: 'String'
                        addressLine5: 'String'
                        city: 'Chicago'
                        state: 'IL'
                        zipCode: '60601'
                        zipCodeExtension: '1234'
                        country: 'US'
                  taxWithholdingInstructions:
                    - party:
                        taxId: '123456789'
                        firstName: 'Morgan'
                        middleName: 'B'
                        lastName: 'Lee'
                        type: individual
                      taxWithholdingType: 'FEDERAL'
                      taxRateToUse: 'USEVALUESENTERED'
                      filingStatus: 'SINGLE'
                      dollar: 15.00
                  charges:
                    - chargeType: 'WITHDRAWALCHARGE'
                      isChargeWaived: false
                    - chargeType: 'EXPENSECHARGE'
                  isOverride: false
              OneTimePartialWithdrawal_NonRMD_Example:
                summary: Partial Withdrawal non-RMD subtype (specified-withdrawal)
                value:
                  effectiveDate: '2025-04-01'
                  nsccParticipantId: 'NSCC777'
                  cusip: '0275IFOW4'
                  producer:
                    producerNumber: 'PROD777'
                    npn: '3333333333'
                    crdNumber: '4444444444'
                  transactionAmounts:
                    requestedAmount: 1000
                    amountType: 'AMOUNT'
                    disbursementType: 'GROSS'
                    disbursementPaymentForm: 'CHECK'
                  allocationOption: 'SPECIFIEDFUNDS'
                  fundDistributions:
                    - fundId: 'FUND-NRMD1'
                      fundName: 'Income Fund'
                      totalFundValue: 4000
                      requestedAmount: 1000
                  payeeOrBeneficiary:
                    - paymentForm: 'CHECK'
                      allocationPercentage: 100.00
                      party:
                        taxId: '123456789'
                        firstName: 'Jordan'
                        middleName: 'C'
                        lastName: 'Kim'
                        type: individual
                        address:
                          addressId: 'Addr_NRMD'
                          addressType: 'RESIDENCE'
                          addressLine1: '400 Oak St'
                          addressLine2: 'Apt 2'
                          addressLine3: 'Bldg B'
                          addressLine4: 'String'
                          addressLine5: 'String'
                          city: 'San Francisco'
                          state: 'CA'
                          zipCode: '94102'
                          zipCodeExtension: '5555'
                          country: 'US'
                  parties:
                    - taxId: '123456789'
                      firstName: 'Jordan'
                      middleName: 'C'
                      lastName: 'Kim'
                      type: individual
                      relationships:
                        - owner
                      paymentForm: 'CHECK'
                      allocationPercentage: 100
                      bank:
                        bankId: 'Bank_NRMD'
                        nameOnAccount: 'Jordan Kim'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '555666777'
                        routingNumber: '111222333'
                        branchName: 'Uptown Branch'
                      address:
                        addressId: 'Addr_NRMD'
                        addressType: 'RESIDENCE'
                        addressLine1: '400 Oak St'
                        addressLine2: 'Apt 2'
                        addressLine3: 'Bldg B'
                        addressLine4: 'String'
                        addressLine5: 'String'
                        city: 'San Francisco'
                        state: 'CA'
                        zipCode: '94102'
                        zipCodeExtension: '5555'
                        country: 'US'
                  taxWithholdingInstructions:
                    - party:
                        taxId: '123456789'
                        firstName: 'Jordan'
                        middleName: 'C'
                        lastName: 'Kim'
                        type: individual
                      taxWithholdingType: 'STATE'
                      taxRateToUse: 'USEVALUESENTERED'
                      filingStatus: 'SINGLE'
                      dollar: 15.00
                      taxJurisdiction: 'USA'
                  charges:
                    - chargeType: 'WITHDRAWALCHARGE'
                      isChargeWaived: true
                      chargeWaiverReason: 'PROMO'
                  isOverride: true
      responses:
        '201':
          description: Created — withdrawal request accepted for processing.
          headers:
            Location:
              description: >
                URL of the created arrangement resource.
                Format: /v1/policies/{policyNumber}/withdrawal-requests/{requestId}
              schema:
                type: string
                format: uri
            correlationId:
              $ref: '#/components/headers/correlationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WithdrawalRequestStatus'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

  /v1/policies/{policyNumber}/withdrawal-requests/full-surrenders:
    post:
      operationId: submitFullSurrenderRequest
      tags:
        - Full Surrender Request
      description: >
        Submit a full surrender request.
      parameters:
        - $ref: '#/components/parameters/PolicyNumber'
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/AssociatedFirmId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullSurrenderRequest'
            examples:
              FullSurrender_Example:
                summary: Full Surrender request
                value:
                  effectiveDate: '2025-02-01'
                  nsccParticipantId: 'NSCC999'
                  cusip: '0275IFOW4'
                  producer:
                    producerNumber: 'PROD999'
                    npn: '9876543210'
                    crdNumber: '1234567890'
                  transactionAmounts:
                    disbursementType: 'NET'
                    disbursementPaymentForm: 'EFT'
                  payeeOrBeneficiary:
                    - paymentForm: 'EFT'
                      allocationPercentage: 100.00
                      party:
                        firstName: 'Taylor'
                        middleName: 'A'
                        lastName: 'Johnson'
                        type: 'individual'
                        taxId: '123456789'
                        bank:
                          bankId: 'Bank_FS'
                          nameOnAccount: 'Taylor Johnson'
                          accountStatus: 'ACTIVEBANKACCOUNT'
                          accountType: 'CHECKING'
                          accountNumber: '9876543210'
                          routingNumber: '987654321'
                          branchName: 'Central Branch'
                        address:
                          addressId: 'Addr_FS'
                          addressType: 'RESIDENCE'
                          addressLine1: '200 Main St'
                          addressLine2: 'Suite 10'
                          addressLine3: 'Floor 2'
                          addressLine4: 'String'
                          addressLine5: 'String'
                          city: 'New York'
                          state: 'NY'
                          zipCode: '10001'
                          zipCodeExtension: '0001'
                          country: 'US'
                  parties:
                    - taxId: '123456789'
                      firstName: 'Taylor'
                      middleName: 'A'
                      lastName: 'Johnson'
                      type: individual
                      relationships:
                        - owner
                      paymentForm: 'EFT'
                      allocationPercentage: 100
                      bank:
                        bankId: 'Bank_FS'
                        nameOnAccount: 'Taylor Johnson'
                        accountStatus: 'ACTIVEBANKACCOUNT'
                        accountType: 'CHECKING'
                        accountNumber: '9876543210'
                        routingNumber: '987654321'
                        branchName: 'Central Branch'
                      address:
                        addressId: 'Addr_FS'
                        addressType: 'RESIDENCE'
                        addressLine1: '200 Main St'
                        addressLine2: 'Suite 10'
                        addressLine3: 'Floor 2'
                        addressLine4: 'String'
                        addressLine5: 'String'
                        city: 'New York'
                        state: 'NY'
                        zipCode: '10001'
                        zipCodeExtension: '0001'
                        country: 'US'
                  taxWithholdingInstructions:
                    - party:
                        taxId: '123456789'
                        firstName: 'Taylor'
                        middleName: 'A'
                        lastName: 'Johnson'
                        type: 'individual'
                      taxWithholdingType: 'FEDERAL'
                      taxRateToUse: 'USEVALUESENTERED'
